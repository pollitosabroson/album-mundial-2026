<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mundial 2026 · Repes & Faltantes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#efe7d6;--paper:#fbf8f1;--card:#fff;--card2:#f5efe2;--ink:#1c1810;--muted:#948a75;--line:rgba(28,24,16,.12);
    --gold:#e0930a;--goldsoft:#fbeac4;--goldink:#8a5a02;--green:#12864a;--greensoft:#dcefdf;--coral:#d64b34;--coralsoft:#f9e0d9;--navy:#15304f;
  }
  :root[data-theme=dark]{
    --bg:#10131c;--paper:#161a26;--card:#1b2030;--card2:#252b3d;--ink:#f3f0e9;--muted:#aab2c4;--line:rgba(255,255,255,.14);
    --gold:#f7ab22;--goldsoft:rgba(247,171,34,.18);--goldink:#f8d089;--green:#43c079;--greensoft:rgba(67,192,121,.18);--coral:#ff7059;--coralsoft:rgba(255,112,89,.18);--navy:#22598f;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:'Archivo',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;padding:20px 15px 70px;}
  ::selection{background:var(--gold);color:#241a05;}
  @keyframes pop{0%{transform:scale(.82)}60%{transform:scale(1.06)}100%{transform:scale(1)}}
  .wrap{max-width:820px;margin:0 auto;}
  button{font-family:inherit;cursor:pointer;}
  /* header */
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .kicker{display:inline-flex;align-items:center;gap:7px;background:var(--goldsoft);border:1px solid var(--gold);color:var(--goldink);font-size:10.5px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;padding:5px 11px;border-radius:999px;}
  .kicker .sq{width:7px;height:7px;border-radius:2px;background:var(--gold);transform:rotate(45deg);display:inline-block;}
  h1{font-size:34px;font-weight:900;letter-spacing:-1px;line-height:1.02;margin:11px 0 5px;}
  p.sub{color:var(--muted);font-size:13.5px;line-height:1.5;margin:0;max-width:52ch;}
  .hdrbtns{display:flex;gap:7px;flex:none;}
  .iconbtn{background:var(--card);border:1.5px solid var(--line);border-radius:999px;color:var(--ink);font-size:15px;line-height:1;width:40px;height:38px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 0 var(--line);}
  .lang{background:var(--card);border:1.5px solid var(--line);border-radius:999px;color:var(--ink);font-size:12px;font-weight:800;letter-spacing:.5px;padding:9px 14px;box-shadow:0 1px 0 var(--line);}
  /* tabs */
  .tabs{display:flex;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:16px;}
  .tab{flex:1;background:transparent;border:none;border-radius:10px;color:var(--muted);font-size:14px;font-weight:800;padding:11px 6px;}
  .tab.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1);}
  /* banners */
  .banner{display:flex;flex-wrap:wrap;align-items:center;gap:10px;background:var(--goldsoft);border:1px solid var(--gold);border-radius:14px;padding:11px 14px;margin-bottom:16px;}
  .banner .msg{flex:1;min-width:150px;color:var(--goldink);font-size:12.5px;font-weight:700;}
  .filewarn{display:flex;gap:10px;align-items:center;background:var(--coralsoft);border:1px solid var(--coral);border-radius:14px;padding:11px 14px;margin-bottom:14px;color:var(--coral);font-size:12.5px;line-height:1.45;}
  .bbtn{background:var(--gold);border:none;border-radius:10px;color:#241a05;font-weight:800;font-size:12.5px;padding:8px 14px;}
  .bbtn.ghost{background:transparent;border:1px solid var(--gold);color:var(--goldink);font-weight:700;font-size:12px;padding:8px 12px;}
  /* generic card */
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 2px 0 var(--line);}
  .card h3{margin:0 0 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:800;}
  .statsview{display:flex;flex-direction:column;gap:14px;}
  /* donut */
  .donutrow{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .donut{position:relative;width:132px;height:132px;flex:none;}
  .donut svg{width:132px;height:132px;transform:rotate(-90deg);}
  .donut .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .donut .pctn{font-size:27px;font-weight:900;line-height:1;}
  .donut .pctl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
  /* stat grid */
  .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .scell{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;}
  .scell .n{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.1;}
  .scell .l{color:var(--muted);font-size:10.5px;font-weight:600;margin-top:3px;line-height:1.3;}
  .scell .n.g{color:var(--gold);}
  .scell .n.gr{color:var(--green);}
  .scell.gold{background:var(--goldsoft);border-color:var(--gold);}
  .scell.gold .n{color:var(--goldink);}.scell.gold .l{color:var(--goldink);opacity:.8;}
  .scell.green{background:var(--greensoft);border-color:var(--green);}
  .scell.green .n{color:var(--green);}.scell.green .l{color:var(--green);opacity:.85;}
  /* navy finish card */
  .navycard{background:linear-gradient(135deg,var(--navy),#1d436d);border:1px solid var(--navy);border-radius:18px;padding:18px;color:#fff;box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .navycard h3{margin:0 0 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#ffd68a;font-weight:800;}
  .navycard .scell{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18);}
  .navycard .scell .n{color:#ffd68a;}.navycard .scell .l{color:#fff;opacity:.8;}
  .navycard .note{margin:11px 0 0;font-size:11px;line-height:1.5;opacity:.72;}
  .note{margin:10px 0 0;font-size:11px;color:var(--muted);line-height:1.5;}
  /* ranking rows */
  .rank{padding:16px 18px;}
  .srow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);}
  .srow:last-child{border-bottom:none;}
  .mark{display:inline-flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-weight:800;flex:none;}
  .flag{object-fit:cover;box-shadow:0 0 0 1px var(--line);flex:none;}
  .srow .code{font-family:ui-monospace,monospace;font-weight:800;color:var(--gold);font-size:12px;width:40px;flex:none;}
  .srow .nm{flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar{height:7px;background:var(--card2);border-radius:999px;overflow:hidden;flex:none;}
  .bar>span{display:block;height:100%;border-radius:999px;}
  .srow .val{font-family:ui-monospace,monospace;font-weight:800;font-size:12.5px;width:44px;text-align:right;flex:none;}
  /* collection top stats */
  .topcards{display:flex;gap:10px;margin-bottom:14px;}
  .topcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 15px;box-shadow:0 2px 0 var(--line);}
  .topcard .n{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;}
  .topcard .n.g{color:var(--gold);}
  .topcard .l{color:var(--muted);font-size:11px;font-weight:600;margin-top:4px;}
  /* adder */
  .adder{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:14px;box-shadow:0 2px 0 var(--line);}
  .adder .lab{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:9px;}
  .adderrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  select{background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-family:inherit;font-size:14px;font-weight:600;padding:10px;cursor:pointer;}
  select.team{flex:2;min-width:160px;}select.num{flex:1;min-width:88px;}
  .addbtn{background:var(--gold);border:none;border-radius:10px;color:#241a05;font-weight:800;font-size:13.5px;padding:11px 18px;}
  .warn{color:var(--coral);font-size:12px;font-weight:600;margin-top:9px;}
  /* toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .search{flex:1;min-width:160px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--ink);font-family:inherit;font-size:14px;outline:none;box-shadow:0 2px 0 var(--line);}
  .toolbtn{background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:0 14px;height:44px;color:var(--muted);font-size:13px;font-weight:700;white-space:nowrap;box-shadow:0 2px 0 var(--line);}
  .toolbtn.on{background:var(--goldsoft);border-color:var(--gold);color:var(--goldink);}
  /* teams */
  .teams{display:flex;flex-direction:column;gap:9px;}
  .team{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 2px 0 var(--line);}
  .team.has{border-color:rgba(224,147,10,.4);}
  .thead{width:100%;display:flex;align-items:center;gap:12px;background:none;border:none;padding:13px 15px;color:var(--ink);text-align:left;}
  .thead .tcode{font-family:ui-monospace,monospace;font-weight:800;color:var(--gold);font-size:12.5px;}
  .thead .tname{font-size:14.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tinfo{flex:1;min-width:0;}
  .trow1{display:flex;align-items:baseline;gap:8px;}
  .trow2{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .tbar{flex:1;max-width:150px;height:5px;background:var(--card2);border-radius:999px;overflow:hidden;}
  .tbar>span{display:block;height:100%;border-radius:999px;}
  .town{font-size:10.5px;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums;}
  .tcount{font-family:ui-monospace,monospace;font-weight:800;font-size:12px;border-radius:999px;padding:3px 10px;flex:none;}
  .tcount.g{background:var(--gold);color:#241a05;}.tcount.b{background:var(--navy);color:#fff;}
  .chev{color:var(--muted);font-size:18px;flex:none;transition:transform .15s;}
  .chev.open{transform:rotate(90deg);}
  /* chips */
  .gridwrap{border-top:1px solid var(--line);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:10px;padding:12px 15px 16px;}
  .chip{position:relative;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-weight:800;font-size:17px;border:1.5px solid;user-select:none;animation:pop .18s ease;}
  .chip.dupe{background:var(--gold);color:#241a05;border-color:var(--gold);box-shadow:0 2px 0 rgba(0,0,0,.12);}
  .chip.miss{background:var(--coralsoft);color:var(--coral);border-color:var(--coral);border-style:dashed;cursor:pointer;}
  .chip.got{background:var(--greensoft);color:var(--green);border-color:var(--green);text-decoration:line-through;opacity:.8;cursor:pointer;}
  .chip .qty{position:absolute;top:-8px;left:-8px;background:var(--navy);color:#fff;font-size:11px;font-weight:800;border-radius:999px;min-width:22px;height:22px;line-height:22px;text-align:center;padding:0 4px;border:2px solid var(--card);}
  .chip .mini{position:absolute;width:24px;height:24px;border-radius:999px;border:2px solid var(--card);font-size:16px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;color:#fff;}
  .chip .minus{top:-9px;right:-9px;background:var(--coral);}
  .chip .plus{bottom:-9px;right:-9px;background:var(--green);font-size:15px;}
  .chipempty{padding:20px;text-align:center;color:var(--green);font-size:22px;font-weight:900;}
  /* out */
  .out{margin-top:20px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 2px 0 var(--line);}
  .out .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px;}
  .out .ttl{font-size:13px;font-weight:800;}
  .copybtn{background:var(--gold);border:none;border-radius:10px;color:#241a05;font-weight:800;font-size:12.5px;padding:8px 16px;}
  pre{margin:0;white-space:pre-wrap;word-break:break-word;font-family:ui-monospace,monospace;font-size:12.5px;line-height:1.75;color:var(--ink);max-height:280px;overflow:auto;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:26px;}
  .foot{color:var(--muted);font-size:11px;line-height:1.5;margin-top:20px;opacity:.75;}
</style>

<div class="wrap">
  <div class="topbar">
    <div style="min-width:0">
      <div class="kicker"><span class="sq"></span><span id="kicker"></span></div>
      <h1 id="h1"></h1>
      <p class="sub" id="sub"></p>
    </div>
    <div class="hdrbtns">
      <button class="iconbtn" id="themeBtn" aria-label="theme"></button>
      <button class="lang" id="langBtn"></button>
    </div>
  </div>

  <div class="filewarn" id="fileWarn" style="display:none"><span id="fileWarnMsg"></span></div>

  <div class="tabs">
    <button class="tab" id="tabRepes"></button>
    <button class="tab" id="tabFaltan"></button>
    <button class="tab" id="tabStats"></button>
  </div>

  <div class="banner" id="banner" style="display:none">
    <span class="msg" id="bannerMsg"></span>
    <button class="bbtn" id="genBtn"></button>
    <button class="bbtn ghost" id="discardBtn"></button>
  </div>

  <div class="statsview" id="statsZone" style="display:none"></div>

  <div id="collZone">
    <div class="topcards" id="topStats">
      <div class="topcard"><div class="n g" id="stat1n">0</div><div class="l" id="stat1l"></div></div>
      <div class="topcard"><div class="n" id="stat2n">0</div><div class="l" id="stat2l"></div></div>
    </div>

    <div class="adder" id="adder" style="display:none">
      <div class="lab" id="addLabel"></div>
      <div class="adderrow">
        <select class="team" id="addTeam"></select>
        <select class="num" id="addNum"></select>
        <button class="addbtn" id="addBtn"></button>
      </div>
      <div class="warn" id="addWarn" style="display:none"></div>
    </div>

    <div class="toolbar">
      <input class="search" id="search">
      <button class="toolbtn" id="filterBtn"></button>
      <button class="toolbtn" id="extraBtn" style="display:none"></button>
      <button class="toolbtn" id="expBtn"></button>
      <button class="toolbtn" id="impBtn"></button>
      <button class="toolbtn" id="loadBtn"></button>
      <button class="toolbtn" id="resetBtn"></button>
      <input type="file" id="impFile" accept="application/json" style="display:none">
    </div>

    <div class="teams" id="teams"></div>

    <div class="out" id="outBox">
      <div class="row">
        <span class="ttl" id="outTitle"></span>
        <button class="copybtn" id="copyBtn"></button>
      </div>
      <pre id="output"></pre>
    </div>
  </div>

  <p class="foot" id="foot"></p>
</div>

<script>
// ============ DATOS BASE (desde tu Excel) ============
const NAMES_ES={PANINI:"Panini (escudo)",FWC:"FIFA",MEX:"México",RSA:"Sudáfrica",KOR:"Corea del Sur",CZE:"Rep. Checa",CAN:"Canadá",BIH:"Bosnia y H.",QAT:"Qatar",SUI:"Suiza",BRA:"Brasil",MAR:"Marruecos",HAI:"Haití",SCO:"Escocia",USA:"Estados Unidos",PAR:"Paraguay",AUS:"Australia",TUR:"Turquía",GER:"Alemania",CUW:"Curazao",CIV:"Costa de Marfil",ECU:"Ecuador",NED:"Holanda",JPN:"Japón",SWE:"Suecia",TUN:"Túnez",BEL:"Bélgica",EGY:"Egipto",IRN:"Irán",NZL:"Nueva Zelanda",ESP:"España",CPV:"Cabo Verde",KSA:"Arabia Saudita",URU:"Uruguay",FRA:"Francia",SEN:"Senegal",IRQ:"Iraq",NOR:"Noruega",ARG:"Argentina",ALG:"Algeria",AUT:"Austria",JOR:"Jordania",POR:"Portugal",COD:"Congo",UZB:"Uzbekistán",COL:"Colombia",ENG:"Inglaterra",CRO:"Croacia",GHA:"Ghana",PAN:"Panamá",CC:"Coca-Cola"};
const NAMES_EN={PANINI:"Panini (crest)",FWC:"FIFA",MEX:"Mexico",RSA:"South Africa",KOR:"South Korea",CZE:"Czechia",CAN:"Canada",BIH:"Bosnia & H.",QAT:"Qatar",SUI:"Switzerland",BRA:"Brazil",MAR:"Morocco",HAI:"Haiti",SCO:"Scotland",USA:"USA",PAR:"Paraguay",AUS:"Australia",TUR:"Türkiye",GER:"Germany",CUW:"Curaçao",CIV:"Ivory Coast",ECU:"Ecuador",NED:"Netherlands",JPN:"Japan",SWE:"Sweden",TUN:"Tunisia",BEL:"Belgium",EGY:"Egypt",IRN:"Iran",NZL:"New Zealand",ESP:"Spain",CPV:"Cape Verde",KSA:"Saudi Arabia",URU:"Uruguay",FRA:"France",SEN:"Senegal",IRQ:"Iraq",NOR:"Norway",ARG:"Argentina",ALG:"Algeria",AUT:"Austria",JOR:"Jordan",POR:"Portugal",COD:"DR Congo",UZB:"Uzbekistan",COL:"Colombia",ENG:"England",CRO:"Croatia",GHA:"Ghana",PAN:"Panama",CC:"Coca-Cola"};
const ORDER=["PANINI","FWC","MEX","RSA","KOR","CZE","CAN","BIH","QAT","SUI","BRA","MAR","HAI","SCO","USA","PAR","AUS","TUR","GER","CUW","CIV","ECU","NED","JPN","SWE","TUN","BEL","EGY","IRN","NZL","ESP","CPV","KSA","URU","FRA","SEN","IRQ","NOR","ARG","ALG","AUT","JOR","POR","COD","UZB","COL","ENG","CRO","GHA","PAN","CC"];
const RANGE={PANINI:1,FWC:19,CC:14}; // resto = 20
function maxOf(c){return RANGE[c]||20;}
const SPECIAL=["PANINI","FWC","CC"]; // no son selecciones nacionales: se agrupan aparte
const isSpecial=c=>SPECIAL.includes(c);
const PER_PACK=7;      // cromos por sobre (estándar Mundial 2026, fijo)
const PACK_PRICE=1.5;  // € por sobre
// banderas (flagcdn) por código ISO; especiales llevan badge de color en su lugar
const ISO={MEX:'mx',RSA:'za',KOR:'kr',CZE:'cz',CAN:'ca',BIH:'ba',QAT:'qa',SUI:'ch',BRA:'br',MAR:'ma',HAI:'ht',SCO:'gb-sct',USA:'us',PAR:'py',AUS:'au',TUR:'tr',GER:'de',CUW:'cw',CIV:'ci',ECU:'ec',NED:'nl',JPN:'jp',SWE:'se',TUN:'tn',BEL:'be',EGY:'eg',IRN:'ir',NZL:'nz',ESP:'es',CPV:'cv',KSA:'sa',URU:'uy',FRA:'fr',SEN:'sn',IRQ:'iq',NOR:'no',ARG:'ar',ALG:'dz',AUT:'at',JOR:'jo',POR:'pt',COD:'cd',UZB:'uz',COL:'co',ENG:'gb-eng',CRO:'hr',GHA:'gh',PAN:'pa'};
const SPECIAL_STYLE={PANINI:{bg:'#1e42a8',fg:'#fff',t:'P'},FWC:{bg:'#e0930a',fg:'#241a05',t:'F'},CC:{bg:'#d3122a',fg:'#fff',t:'CC'}};
function flagUrl(c){return ISO[c]?'https://flagcdn.com/'+ISO[c]+'.svg':null;}
// marca visual (bandera o badge) para un código; big=cabecera de selección, small=filas de ranking
function flagMark(code,big){
  const sp=SPECIAL_STYLE[code];
  const w=big?34:28,h=big?24:20,r=big?5:4,fs=big?11:10;
  const dim='width:'+w+'px;height:'+h+'px;border-radius:'+r+'px';
  if(sp)return `<span class="mark" style="${dim};background:${sp.bg};color:${sp.fg};font-size:${fs}px">${sp.t}</span>`;
  const url=flagUrl(code);
  if(url)return `<img class="flag" src="${url}" loading="lazy" style="${dim}" onerror="this.style.visibility='hidden'">`;
  return `<span class="mark" style="${dim};background:var(--card2)"></span>`;
}

// Faltantes (celdas rellenas del Excel)
const FALTAN_DEFAULT={
PANINI:[],FWC:[1,3,4,7,13,14,15,16,17],MEX:[2,3,6,7,10,12,13,14,18,19,20],RSA:[3,5,8,10,12,13,17,18,20],
KOR:[4,5,6,7,8,9,10,11,16,17],CZE:[1,7,8,9,10,13,15,17,19],CAN:[2,4,5,6,7,11,14,15,16,17,18,20],
BIH:[2,3,4,6,8,10,11,15,16,17,20],QAT:[3,4,6,8,13,14,17,18],SUI:[3,4,7,8,9,10,11,12,13,14,16],
BRA:[2,3,6,8,9,11,12,14,15,16,17,18,19,20],MAR:[2,6,7,8,11,13,14,15,17,20],HAI:[1,3,4,5,6,8,9,11,13,14,16,17,18,19],
SCO:[2,5,7,10,11,13,16,18,19],USA:[1,3,7,9,11,12,13,14,18],PAR:[2,5,8,11,12,13,14,15,16,18],

// ============ ESTADO ============
const KEY='mundial2026';
const THEME_KEY='mundial2026_theme';
let mem={};
const store={get(k){try{return localStorage.getItem(k);}catch(e){return k in mem?mem[k]:null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}};
function clone(o){return JSON.parse(JSON.stringify(o));}

let data={repes:{},faltan:{}};
let baseline=null,exported=false,fileMode=false;
let lang='es',theme='light',tab='repes',openCode=null,filterOn=false,showObtained=false,filter='',addTeam='MEX';

function defaults(){return{repes:clone(REPES_DEFAULT),faltan:clone(FALTAN_DEFAULT)};}
function snap(o){return JSON.stringify({repes:(o&&o.repes)||{},faltan:(o&&o.faltan)||{}});}
function isDirty(){return baseline?snap(data)!==snap(baseline):false;}
function save(){exported=false;store.set(KEY,JSON.stringify(data));}
function t(k){return STR[lang][k];}
function names(){return lang==='es'?NAMES_ES:NAMES_EN;}
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);}

// owned = rango completo menos faltan actuales
function ownedNums(code){
  const f=new Set(data.faltan[code]||[]);
  const out=[];for(let i=1;i<=maxOf(code);i++){if(!f.has(i))out.push(i);}return out;
}

async function init(){
  // tema: preferencia guardada o, si no, la del sistema
  const th=store.get(THEME_KEY);
  if(th==='dark'||th==='light')theme=th;
  else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)theme='dark';
  applyTheme();

  fileMode=location.protocol==='file:'; // abierto como archivo: fetch bloqueado
  // El repo (data.json) SIEMPRE manda al entrar y sobrescribe lo guardado en este navegador.
  let repo=null;
  try{
    const r=await fetch('./data.json?t='+Date.now());
    if(r.ok)repo=await r.json();
  }catch(e){}

  if(repo&&repo.repes&&repo.faltan){
    data=repo;baseline=clone(repo);
    save(); // sobrescribe el localStorage con la versión del repo
  }else{
    // Sin acceso al data.json (p.ej. abierto como file://): usa la copia local o los valores por defecto.
    const raw=store.get(KEY);
    if(raw){try{data=JSON.parse(raw);}catch(e){data=defaults();}}
    else{data=defaults();save();}
    baseline=clone(data);
  }
  if(!data.repes)data.repes={};if(!data.faltan)data.faltan={};
  render();
}

// ============ ACCIONES ============
function bumpRepe(code,num,d){
  if(!data.repes[code])data.repes[code]={};
  const q=(data.repes[code][num]||0)+d;
  if(q<=0)delete data.repes[code][num];else if(q<=9)data.repes[code][num]=q;
  if(data.repes[code]&&!Object.keys(data.repes[code]).length)delete data.repes[code];
  save();render();
}
function toggleFaltan(code,num){
  const arr=data.faltan[code]||[];const i=arr.indexOf(num);
  if(i>=0){arr.splice(i,1);} // conseguida
  else{arr.push(num);arr.sort((a,b)=>a-b);} // restaurar
  data.faltan[code]=arr;save();render();
}
function teamRepeCount(code){return data.repes[code]?Object.values(data.repes[code]).reduce((a,b)=>a+b,0):0;}
function teamFaltanCount(code){return (data.faltan[code]||[]).length;}

function buildRepeOut(){
  const L=[];ORDER.forEach(c=>{const t=data.repes[c];if(!t)return;
    const p=Object.keys(t).map(Number).sort((a,b)=>a-b).map(n=>`${n}(${t[n]}x)`);
    if(p.length)L.push(`${c}: ${p.join(', ')}`);});return L.join('\n');
}
function buildFaltanOut(){
  const L=[t('buscoHead')];ORDER.forEach(c=>{const a=data.faltan[c]||[];
    if(a.length)L.push(`${c}: ${a.slice().sort((x,y)=>x-y).join(', ')}`);});
  return L.length>1?L.join('\n'):'';
}

// ============ ESTADÍSTICAS ============
function computeStats(){
  let total=0,have=0,missing=0,completeTeams=0;const teams=[];
  ORDER.forEach(c=>{
    const max=maxOf(c),fc=teamFaltanCount(c),owned=max-fc,rc=teamRepeCount(c);
    total+=max;have+=owned;missing+=fc;if(fc===0)completeTeams++;
    teams.push({code:c,max,owned,faltan:fc,repe:rc,pct:max?owned/max:0});
  });
  const p=total?have/total:0;
  // sobres restantes ≈ coupon collector: E[cromos] = total * H_missing (H_m = Σ 1/k)
  let H=0;for(let k=1;k<=missing;k++)H+=1/k;
  const stickersNeeded=missing>0?total*H:0;
  const packsLeft=Math.ceil(stickersNeeded/PER_PACK);
  const costLeft=packsLeft*PACK_PRICE;
  const pNew=missing>0?1-Math.pow(p,PER_PACK):0; // prob. ≥1 nuevo en el próximo sobre
  const expNew=PER_PACK*(1-p),expDup=PER_PACK*p;
  let dupTotal=0,dupDistinct=0,dupTeams=0;
  ORDER.forEach(c=>{const tt=data.repes[c];if(tt){const ks=Object.keys(tt);if(ks.length){dupTeams++;dupDistinct+=ks.length;dupTotal+=Object.values(tt).reduce((a,b)=>a+b,0);}}});
  return {total,have,missing,completeTeams,p,packsLeft,costLeft,pNew,expNew,expDup,teams,dupTotal,dupDistinct,dupTeams};
}

  const maxMiss=Math.max(1,...mostMissing.map(t=>t.faltan));

  const sections=[];

  const sectionCards=sections.map(sec=>`<div class="card rank"><h3>${sec.title}</h3>${sec.rows.join('')}</div>`).join('');

  z.innerHTML=`

    document.getElementById('stat1n').textContent=cromos;
    document.getElementById('stat2n').textContent=sel;
    document.getElementById('stat1l').textContent=t('s_faltan1');
    document.getElementById('stat2l').textContent=t('s_faltan2');
    fbtn.textContent=t('filterFaltan');
    const eb=document.getElementById('extraBtn');
    eb.style.display='';eb.textContent=t('showObtained');
    eb.className='toolbtn'+(showObtained?' on':'');
  }
  fbtn.className='toolbtn'+(filterOn?' on':'');

  // adder solo en repes
  const adder=document.getElementById('adder');
  if(tab==='repes'){
    adder.style.display='';
    document.getElementById('addLabel').textContent=t('addLabel');
    document.getElementById('addBtn').textContent=t('add');
    const ts=document.getElementById('addTeam');
    ts.innerHTML=ORDER.map(c=>`<option value="${c}"${c===addTeam?' selected':''}>${c} — ${N[c]}</option>`).join('');
    renderAddNums();
  }else adder.style.display='none';

  // lista
  const elT=document.getElementById('teams');elT.innerHTML='';
  const f=filter.toLowerCase();let shown=0;
  ORDER.forEach(code=>{
    const cnt=tab==='repes'?teamRepeCount(code):teamFaltanCount(code);
    if(filterOn&&cnt===0)return;
    if(f&&!(code.toLowerCase().includes(f)||N[code].toLowerCase().includes(f)))return;
    shown++;
    const isOpen=openCode===code;
    const max=maxOf(code),owned=max-teamFaltanCount(code),pct=max?owned/max:0;
    const team=document.createElement('div');team.className='team'+(cnt>0?' has':'');
    const head=document.createElement('button');head.className='thead';
    head.innerHTML=flagMark(code,true)
      +`<div class="tinfo">`
      +`<div class="trow1"><span class="tcode">${code}</span><span class="tname">${N[code]}</span></div>`
      +`<div class="trow2"><div class="tbar"><span style="width:${Math.round(pct*100)}%;background:${pct>=1?'var(--green)':'var(--gold)'}"></span></div><span class="town">${owned}/${max}</span></div>`
      +`</div>`
      +(cnt>0?`<span class="tcount ${tab==='repes'?'g':'b'}">${cnt}</span>`:'')
      +`<span class="chev ${isOpen?'open':''}">&#8250;</span>`;
    head.onclick=()=>{openCode=isOpen?null:code;render();};
    team.appendChild(head);
    if(isOpen)team.appendChild(buildGrid(code));
    elT.appendChild(team);
  });
  if(!shown){const e=document.createElement('div');e.className='empty';e.textContent='—';elT.appendChild(e);}

  // output
  document.getElementById('outTitle').textContent=tab==='repes'?t('outRepes'):t('outFaltan');
  const out=tab==='repes'?buildRepeOut():buildFaltanOut();
  document.getElementById('output').textContent=out||(tab==='repes'?t('outRepesEmpty'):t('outFaltanEmpty'));

  renderBanner();
}

// banner: avisa cuando hay cambios sin volcar al data.json del repo
function renderBanner(){
  const fw=document.getElementById('fileWarn');
  if(fileMode){fw.style.display='';document.getElementById('fileWarnMsg').textContent=t('fileWarn');}
  else fw.style.display='none';
  const banner=document.getElementById('banner');
  if(isDirty()){
    banner.style.display='';
    document.getElementById('bannerMsg').textContent=exported?t('dirtyExported'):t('dirtyMsg');
    document.getElementById('genBtn').textContent=t('genJson');
    document.getElementById('discardBtn').textContent=t('discard');
  }else banner.style.display='none';
}

function renderAddNums(){
  const sel=document.getElementById('addNum');
  const nums=ownedNums(addTeam);
  sel.innerHTML=nums.length?nums.map(n=>`<option value="${n}">${n}</option>`).join('')
    :`<option value="">—</option>`;
  document.getElementById('addBtn').disabled=!nums.length;
}

function buildGrid(code){
  const wrap=document.createElement('div');wrap.className='gridwrap';
  const g=document.createElement('div');g.className='grid';
  if(tab==='repes'){
    // SOLO los cromos que tienes repetidos (q>=1)
    const reps=data.repes[code]||{};
    Object.keys(reps).map(Number).sort((a,b)=>a-b).forEach(num=>{
      const q=reps[num]||0;if(q<=0)return;
      const chip=document.createElement('div');chip.className='chip dupe';
      chip.innerHTML=`<span>${num}</span>`+(q>1?`<span class="qty">×${q}</span>`:'')
        +`<button class="mini minus">&#8722;</button><button class="mini plus">+</button>`;
      chip.querySelector('.minus').onclick=e=>{e.stopPropagation();bumpRepe(code,num,-1);};
      chip.querySelector('.plus').onclick=e=>{e.stopPropagation();bumpRepe(code,num,1);};
      g.appendChild(chip);
    });
  }else{
    const faltanSet=new Set(data.faltan[code]||[]);
    const base=FALTAN_DEFAULT[code]||[];
    // por defecto: solo las que faltan
    (data.faltan[code]||[]).slice().sort((a,b)=>a-b).forEach(num=>{
      const chip=document.createElement('div');chip.className='chip miss';chip.innerHTML=`<span>${num}</span>`;
      chip.onclick=()=>toggleFaltan(code,num);g.appendChild(chip);
    });
    if(showObtained){
      base.filter(n=>!faltanSet.has(n)).sort((a,b)=>a-b).forEach(num=>{
        const chip=document.createElement('div');chip.className='chip got';chip.innerHTML=`<span>${num}</span>`;
        chip.onclick=()=>toggleFaltan(code,num);g.appendChild(chip);
      });
    }
  }
  if(!g.children.length){const e=document.createElement('div');e.className='chipempty';e.innerHTML='&#10003;';wrap.appendChild(e);return wrap;}
  wrap.appendChild(g);return wrap;
}

// ============ EVENTOS ============
document.getElementById('langBtn').onclick=()=>{lang=lang==='es'?'en':'es';render();};
document.getElementById('themeBtn').onclick=()=>{theme=theme==='dark'?'light':'dark';store.set(THEME_KEY,theme);applyTheme();render();};
document.getElementById('tabRepes').onclick=()=>{tab='repes';openCode=null;render();};
document.getElementById('tabFaltan').onclick=()=>{tab='faltan';openCode=null;render();};
document.getElementById('tabStats').onclick=()=>{tab='stats';openCode=null;render();};
document.getElementById('filterBtn').onclick=()=>{filterOn=!filterOn;render();};
document.getElementById('extraBtn').onclick=()=>{showObtained=!showObtained;render();};
document.getElementById('search').oninput=e=>{filter=e.target.value;render();};
document.getElementById('addTeam').onchange=e=>{addTeam=e.target.value;renderAddNums();};
document.getElementById('addBtn').onclick=()=>{
  const code=addTeam,num=parseInt(document.getElementById('addNum').value,10);
  if(!num)return;
  const w=document.getElementById('addWarn');
  if((data.faltan[code]||[]).includes(num)){w.textContent=t('warnFaltan');w.style.display='';setTimeout(()=>w.style.display='none',2500);return;}
  w.style.display='none';bumpRepe(code,num,1);
};
document.getElementById('copyBtn').onclick=()=>{
  const txt=tab==='repes'?buildRepeOut():buildFaltanOut();if(!txt)return;
  const done=()=>{const b=document.getElementById('copyBtn');b.textContent=t('copied');setTimeout(()=>b.textContent=t('copy'),1500);};
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(done).catch(()=>fb(txt,done));else fb(txt,done);
};
function fb(txt,cb){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);cb&&cb();}
document.getElementById('resetBtn').onclick=()=>{if(confirm(t('confReset'))){data=defaults();save();render();}};
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='data.json';a.click();URL.revokeObjectURL(url);
  exported=true;render();
}
document.getElementById('expBtn').onclick=exportData;
document.getElementById('genBtn').onclick=exportData;
document.getElementById('discardBtn').onclick=()=>{data=clone(baseline);save();render();};
document.getElementById('impBtn').onclick=()=>document.getElementById('impFile').click();
document.getElementById('impFile').onchange=e=>{
  const file=e.target.files[0];if(!file)return;const r=new FileReader();
  r.onload=()=>{try{const o=JSON.parse(r.result);
    if(o&&o.repes&&o.faltan){data=o;save();render();alert(t('okImp'));}else alert(t('badFmt'));
  }catch(err){alert(t('errImp'));}e.target.value='';};r.readAsText(file);
};
document.getElementById('loadBtn').onclick=async()=>{
  if(!confirm(t('confLoad')))return;
  try{const r=await fetch('./data.json?t='+Date.now());
    if(r.ok){const o=await r.json();if(o&&o.repes&&o.faltan){data=o;save();render();alert(t('okLoad'));}else alert(t('badFmt'));}
    else alert(t('noLoad'));
  }catch(e){alert(t('noLoad'));}
};

init();
</script>
